climatique. L'Initiative Kiwa  illustre l'action française :  •   Dotation et gestion :   Un fonds de 77 millions d'euros financé par des bailleurs  multiples (UE, France, Australie, Nouvelle - Zélande, Canada) piloté par l'AFD.  •   Méthodologie :   Utilisation des Solutions fondées sur la Nature (SfN) pour  protéger la biodiversité et adapter les populations.  •   Impact :   Soutien à 40 projets dans 17 territoires (bénéficiant à plus de 220 000  personnes).  o   Projets locaux :   Gérés par l'UICN (ex. restauration des mangroves en  Nouvelle - Calédonie).  o   Projets régionaux :   Gérés par l'AFD (budget de 3 à 5 millions d'euros pour  une coopération transnationale).  5. Défis structurels : L'analyse critique du Sénat \nRessources  Malgré ses ambitions, la France fait face à une réalité matérielle difficile, soulignée par  les rapports parlementaires :  •   Attrition capacitaire :   Le Sénat alerte sur une baisse drastique des effectifs ( -  20 % depuis 2008) et sur le vieillissement critique des équipements de  surveillance (avions Casa, hélicoptères Puma, frégates Floréal).  •   Trous capacitaires :   Retards dans le déploiement des Patrouilleurs Outre - Mer  (POM), essentiels face à la pêche illégale et à la montée en puissance de la  marine chinoise (+138 % de tonnage en 15 ans).  •   La « tyrannie des distances » :   Paris étant à 16 000 km de Nouméa, la  centralisation des décisions nuit à la réactivité stratégique.  6. Recommandations pour une nouvelle gouvernance  Pour pallier ces faiblesses, le Sénat propose une « révolution copernicienne » :  1.   Zonage stratégique :   Diviser la gestion en quatre zones (Océan Indien  occidental, Indopacifique central/ASEAN, Pacifique Sud, Pacifique Oriental).  2.   Pilotage politique décentralisé :   Nommer quatre Secrétaires d'État dédiés à ces  zones spécifiques.  3.   Sanctuarisation budgétaire :   Garantir l'application stricte de la Loi de  Programmation Militaire (LPM) pour livrer les équipements promis en tem  Subventions Étrangères (FSR) :   L'UE intervient pour contrer  les distorsions créées par les États tiers. Un exemple marquant est l'enquête  approfondie sur l'acquisition de Covestro par ADNOC.  •   Digital Markets Act (DMA) :   Application stricte contre les « contrôleurs d'accès »  ( gatekeepers ). Des amendes majeures ont été infligées à Google (2,95 Md€ pour  favoritisme via AdX) et Microsoft (vente liée de Teams). Des enquêtes sont  également en cours sur l'utilisation des données pour l'Intelligence Artificielle. \nRessources  2. Défense, Sécurité et Indépendance Énergétique  La réduction des dépendances stratégiques est au cœur de l'action européenne,  passant par des investissements massifs dans la défense et une refonte de son mix  énergétique.  2.1. Montée en puissance militaire  •   ReArm Europe / Readiness 2030 :   Un plan historique de   800 milliards d'euros  visant à financer l'acquisition conjointe de matériel militaire, l'innovation  industrielle et la protection autonome du continent face à la menace russe.  •   Soutien à l'Ukraine (Ukraine Facility) :   Octroi d'un prêt de 90 milliards d'euros  sans intérêt (2024 - 2027) pour soutenir la reconstruction, l'effort militaire et les  réformes d'adhésion.  2.2. La réussite du plan RePowerEU  La dépendance énergétique de l'UE a été radicalement transformée entre 2021 et 2025 :  •   Le gaz russe est passé de près de 60 % des approvisionnements à   moins de  20 % .  •   Le GNL américain a bondi pour atteindre environ   40 % .  •   Énergies vertes :   En 2025, la production d'électricité renouvelable a dépassé les  sources fossiles. L'objectif 2030 se concentre désormais sur l'hydrogène propre  (40 GW d'électrolyse).  3. Diplomatie Économique et Partenariats Internationaux  L'UE refuse le découplage brutal mais opte pour le   « de - risking »   (réduction des risques)  et diversifie ses alliances.  3.1. Le « De - risking » face à la Chine  Face à un déficit commercial record (305,8 Md€ en 2024) et à la vulnérabilité sur les  matières premières (ex: embargo sur les terres rares fin 2025), l'UE réagit :  •   Mise en place du   Critical Raw Materials Act .  •   Taxation douanière fixe dès juillet 2026 sur les colis e - commerce de faible valeur  (ciblant les géants chinois).  3.2. L'offensive du Global Gateway et les Accords de Libre - Échange  •   Global Gateway :   Alternative aux Nouvelles routes de la soie chinoises, dotée de  300 à 400 milliards d'euros. Le volet Afrique (150 Md€) priorise la transition verte,  le numérique (câbles sous - marins) et la santé. \nRessources  •   Accord UE - Mercosur :   Signé historiquement le 17 janvier 2026 après 25 ans de  négociations, il élimine les droits de douane sur 90 % des marchandises  échangées.  •   Indopacifique :   Sécurisation des routes maritimes (40 % du commerce de l'UE)  face aux tensions géopolitiques.  4. Transition Écologique et Marché Circulaire  L'Europe impose ses normes environnementales au monde, tout en allégeant la  bureaucratie pour ses entreprises internes.  4.1. Nouvelles législations de 2026  •   Circular Economy Act :   Basé sur deux piliers : la gestion des déchets  électroniques (pour récupérer des matières critiques) et la création d'un marché  unique des déchets (harmonisation des critères de sortie du statut de déchet).  •   European Product Act & Advanced Materials Act :   Obligation de réparabilité et  soutien aux matériaux innovants.  •   Simplification administrative :   Objectif de réduction des charges de   25 % pour  toutes les entreprises   et de   35 % pour les PME .  4.2. Le MACF (Mécanisme d'Ajustement Carbone aux Frontières)  Entré dans sa phase d'application opérationnelle au 1er janvier 2026. Les importateurs  d'acier, d'aluminium, de ciment, d'engrais, d'électricité et d'hydrogène doivent  désormais s'acquitter de cette taxe carbone, prévenant ainsi les « fuites de carbone ».  5. Défis Géopolitiques et Filtrage des Investissements  L'UE navigue dans un environnement hostile né           "title": "Les visions concurrentes (FOIP, BRI, ASEAN)",
          "synthesis": "Ressources  Dynamiques Stratégiques et Rivalités de Puissance en Indopacifique  Introduction : Le Nouveau Centre de Gravité Mondial  Le centre de gravité géostratégique et géoéconomique mondial s'est déplacé de l'axe  Euro - Atlantique vers l'Indopacifique. Représentant plus de 60 % du PIB mondial et  abritant plus de la moitié de l'humanité, cet espace océanique continu est devenu le  théât re central de la compétition systémique entre les États - Unis et la République  Populaire de Chine (RPC).  L'architecture de sécurité de la région connaît une profonde mutation : l'hégémonie  unipolaire américaine laisse place à un réseau complexe d'alliances et de partenariats  minilatéraux. Ce rapport décrypte les visions concurrentes, les nouvelles alliances  m ilitaires, les enjeux géoéconomiques et les stratégies d'adaptation des acteurs  régionaux.  1. Visions Concurrentes de l'Espace Indopacifique  L'appellation même d'\"Indopacifique\" n'est pas neutre ; elle traduit une volonté de lier  géographiquement les océans Indien et Pacifique pour contrer l'influence continentale  et maritime de la Chine. Face à ce concept, plusieurs doctrines s'affrontent.  1.1. Le \"Free and Open Indo - Pacific\" (FOIP) : Japon et États - Unis  •   La vision japonaise (L'initiateur) :   Le Japon a été le premier à formuler la vision  du FOIP. Initialement axée sur le contrepoids à la Chine, l'approche de Tokyo s'est  assouplie sous Fumio Kishida pour devenir plus inclusive. Elle met l'accent sur le  maintien d'un ordre fondé sur le droit (n otamment la liberté de navigation via  l'UNCLOS), la connectivité physique par des infrastructures de haute qualité, et  le partenariat d'égal à égal avec les pays du \"Sud global\".  •   La vision américaine (L'approche sécuritaire) :   Les États - Unis ont adopté le  concept du FOIP mais l'ont davantage militarisé. En 2025, la stratégie américaine  repose sur la   \"dissuasion intégrée\" . Il s'agit de coordonner les alliances  bilatérales historiques (Japon, Philippines), la puissance technologique et  économique, ainsi qu'une présence militaire avancée (notamment le long de la  \"première chaîne d'îles\") pour endiguer l'expansionnisme chinoi s.  1.2. La \"Belt and Road Initiative\" (BRI) et la posture chinoise  Pékin rejette catégoriquement le terme \"Indopacifique\", le considérant comme une  rhétorique d'encerclement. La réponse structurelle de la Chine est la   Belt and Road  Initiative (BRI) , et plus spécifiquement sa \"Route de la Soie maritime du XXIe siècle\".  •   Objectif :   Créer des réseaux massifs d'infrastructures (ports, voies ferrées,  numérique) centrés sur la Chine. \nRessources  •   Le Dilemme de Malacca :   La stratégie maritime chinoise vise à pallier sa plus  grande vulnérabilité géopolitique : sa forte dépendance au détroit de Malacca  pour ses importations énergétiques. Le financement de ports (Gwadar au  Pakistan, Kyaukpyu au Myanmar) permet de sécuriser d es voies alternatives  terrestres et maritimes.  1.3. La Centralité de l'ASEAN et l'AOIP  L'Association des Nations de l'Asie du Sud - Est (ASEAN) promeut sa propre grille de  lecture via l' ASEAN Outlook on the Indo - Pacific (AOIP) .  •   La Centralité :   L'ASEAN revendique le rôle de pivot diplomatique (\"force  motrice\") et refuse d'être le terrain d'un conflit par procuration.  •   La Doctrine :   Elle privilégie le dialogue inclusif, la non - ingérence et la  coopération géoéconomique à travers ses forums dédiés (EAS, ARF) plutôt que la  confrontation.  2. L'Architecture de Sécurité en Réseau : Du Bilatéralisme au Minilatéralisme  Pour répondre à l'expansion navale sans précédent de la Chine, les puissances  occidentales et leurs alliés régionaux superposent de nouveaux accords au traditionnel  système américain des alliances bilatérales (\"Hub - and - Spokes\").  2.1. L'AUKUS : Le Pacte de Sécurité \"Dure\"  Signée en 2021 entre l'Australie, le Royaume - Uni et les États - Unis, cette alliance est  strictement militaire et technologique.  •   Pilier I :   La livraison de sous - marins à propulsion nucléaire à l'Australie,  augmentant radicalement sa capacité de dissuasion océanique.  •   Pilier II :   Le développement et l'intégration conjointe de technologies critiques de  rupture (intelligence artificielle, missiles hypersoniques, technologies  quantiques et cybersécurité).  2.2. Le QUAD : L'Équilibre Souple (\"Soft Balancing\")  Le   Quadrilateral Security Dialogue   réunit les États - Unis, le Japon, l'Inde et l'Australie.  Contrairement à l'AUKUS, ce n'est pas une alliance militaire contraignante. Il se  concentre sur des domaines de sécurité non - traditionnelle et hybride : exercices navals  conjoints (Malabar), surveill ance maritime, distribution de vaccins et sécurisation des  chaînes d'approvisionnement technologiques (5G/6G, IA).  3. Le Nexus Sécurité - Économie : Le Théâtre Géoéconomique  Dans l'Indopacifique, la guerre économique prime souvent sur l'affrontement militaire  direct. L'interdépendance commerciale est devenue une \"arme\" géopolitique. \nRessources  3.1. La Guerre des Infrastructures  Face aux \"pièges de la dette\" souvent reprochés à la BRI chinoise, le camp occidental  tente de proposer des alternatives viables :  •   Le Blue Dot Network (BDN) :   Conçu par les États - Unis, le Japon et l'Australie, il  agit comme un \"label de qualité\" (type Michelin) pour certifier les projets  d'infrastructure respectant la transparence financière, la durabilité écologique et  la bonne gouvernance.  3.2. La Guerre Technologique : \"Petit Jardin, Haute Clôture\"  Le contrôle des technologies critiques, particulièrement les semi - conducteurs, est  l'enjeu principal. L'approche américaine de \"petit jardin, haute clôture\" consiste à  imposer des embargos et des contrôles drastiques sur les exportations technologiques  ver s la Chine pour ralentir la modernisation de son complexe militaro - industriel et son  développement de l'IA, tout en protégeant les nœuds cruciaux (comme l'île de Taïwan  avec ses usines TSMC).  4. Agence Régionale : Les Stratégies de \"Couverture\" (Hedging)  Les puissances moyennes de la région refusent de s'aligner aveuglément sur  Washington ou Pékin. Elles adoptent une stratégie de   \"Hedging\" (Couverture)   :  •   Objectif :   Maximiser les profits économiques et sécuritaires en cultivant des  relations avec les deux superpuissances tout en minimisant la dépendance  exclusive.  •   Exemples :   Le Vietnam pratique la \"diplomatie du bambou\" (s'adapter au vent  sans rompre), l'Indonésie joue sur l'ambiguïté pour maintenir son autonomie,  tandis que les Philippines tentent de conserver un canal diplomatique avec Pékin  tout en réactivant vigoureusemen t leur alliance de défense avec Washington.  5. Recommandations pour la Stabilité Régionale  Face à cette \"guerre froide\" moderne, plusieurs mesures sont préconisées pour éviter  l'escalade :  1.   Mécanismes de gestion de crise :   Restaurer les lignes de communication  directes (Hotlines) pour éviter tout conflit accidentel.  2.   Architecture Hybride :   Harmoniser les approches en rendant les groupements  minilatéraux (QUAD, AUKUS) complémentaires avec les institutions de l'ASEAN,  sans les court - circuiter.  3.   Résilience et \"Friend - Shoring\" :   Établir des règles géoéconomiques claires et  coordonner les chaînes d'approvisionnement entre alliés pour résister à la  coercition économique. \nRessources",

          "synthesis": "Ressources  Rapport de Synthèse : Les Outre - mer français dans le Pacifique (2024 - 2026)  Enjeux de souveraineté, dynamiques économiques et menaces hybrides  Introduction  La période 2024 - 2026 s'avère décisive pour les territoires français de la zone  Indopacifique, particulièrement la Nouvelle - Calédonie et la Polynésie française. Situés  au cœur des rivalités géopolitiques mondiales, ces territoires font face à des défis  inte rnes majeurs   —   mutations institutionnelles inédites, crise de la filière minière   —   et à  des menaces externes croissantes sous forme d'ingérences hybrides. Ce rapport  analyse de manière exhaustive ces dynamiques selon les quatre axes soulevés par la  documen tation étudiée.  1. La Mutation Institutionnelle de la Nouvelle - Calédonie  L'année 2024 a été marquée par une crise insurrectionnelle sans précédent,  contraignant l'État français et les acteurs locaux à repenser le statut du territoire.  1.1. Les origines de la crise de 2024  En mai 2024, la Nouvelle - Calédonie a connu de graves émeutes en réaction au projet de  « dégel » du corps électoral . Ce projet visait à permettre aux résidents installés depuis  plus de dix ans de voter aux élections provinciales. Les indépendantistes (notamment le  FLNKS et la CCAT) s'y sont fermement opposés, craignant une marginalisation définitive  de la population au tochtone kanak. Le bilan fut lourd : 13 morts, 2,2 milliards d'euros de  dégâts et une paralysie économique du territoire.  1.2. De nouveaux jalons : Accords de Bougival et Élysée - Oudinot  Face à l'impasse, de nouvelles négociations ont abouti à deux accords fondateurs  redéfinissant les liens entre Paris et Nouméa :  •   L'Accord de Bougival (12 juillet 2025) :   Surnommé « Le pari de la confiance », il  acte la création d'un   « État de la Nouvelle - Calédonie »   (statut   sui generis ) au  sein de la Constitution française. Son innovation majeure réside dans la création  d'une   nationalité calédonienne , ouvrant la voie à une double nationalité. Le  territoire disposera également d'une « Loi fondamentale » pour garantir son auto -  organisation.  •   L'Accord Élysée - Oudinot (19 janvier 2026) :   Il vient préciser le cadre en  affirmant l'identité kanak et calédonienne, tout en instaurant de nouvelles  modalités pour le droit à l'autodétermination (qui dépasse désormais la simple  logique binaire \"oui/non\" à l'indépendance).  1.3. Un calendrier de transition (2026) \nRessources  L'année 2026 est jalonnée d'étapes décisives : le vote de la loi constitutionnelle par le  Parlement français au printemps, une consultation locale entre juin et juillet, pour  aboutir à de nouvelles élections provinciales post - réforme avant la fin de l'anné e.  2. La Crise de la Filière Nickel : Un Défi de Souveraineté Industrielle  La Nouvelle - Calédonie concentre environ 25% des réserves mondiales de nickel.  Cependant, cette industrie vit une crise systémique menaçant 7 000 à 8 000 emplois  locaux.  2.1. Les causes de la perte de compétitivité  L'industrie calédonienne est écrasée par la concurrence de l' Indonésie , qui produit  aujourd'hui près de 50% du nickel mondial sous forme de NPI (Nickel Pig Iron) à bas  coût. Les usines locales (SLN, KNS, Prony Resources) souffrent de handicaps  structurels :  •   Coûts énergétiques prohibitifs :   Environ 200 USD/MWh en Nouvelle - Calédonie,  contre 50 à 70 USD en Indonésie.  •   Normes asymétriques :   Les opérateurs français respectent des standards  sociaux et environnementaux très stricts, là où l'Indonésie bénéficie de capitaux  chinois massifs sans les mêmes contraintes.  2.2. Le sauvetage par le « Pacte Nickel »  Pour éviter l'effondrement, l'État français a mis sur la table le « Pacte Nickel ». Ce plan  stratégique de restructuration inclut :  •   Des   subventions à l'énergie   (200 M€/an) pour abaisser le coût du MWh.  •   Une réforme du code minier autorisant l' exportation de minerai brut , afin de  générer des flux de trésorerie rapides pour les exploitants.  •   Une orientation de la production vers la   « matte de nickel »   (nickel de classe I),  un format hautement stratégique adapté au marché européen des batteries  lithium - ion pour la transition énergétique.  3. Polynésie Française : Stabilité Économique et Ressources Stratégiques  À l'inverse des turbulences calédoniennes, la Polynésie française affiche une certaine  stabilité économique, notamment grâce à la valorisation de son immense Zone  Économique Exclusive (ZEE) de 5,2 millions de km².  3.1. Les dynamiques du secteur primaire  L'année 2024 a enregistré des résultats positifs pour la pêche polynésienne (11 194  tonnes au total). Cette réussite repose sur une   pêche hauturière historique   (8 790 \nRessources  tonnes) portée par l'exploitation du thon germon, conjuguée à une relance de  l'aquaculture (crevettes).  3.2. Le dilemme des grands fonds marins  Le véritable enjeu géopolitique réside sous la surface. La Polynésie possède des  gisements massifs d' encroûtements cobaltifères , estimés à 50 millions de tonnes de  cobalt (soit 600 ans de réserves mondiales). Toutefois, face à la course aux minerais  stratégiques à laquelle se livrent ses voisins (aidés par la Chine), la France et la  Polynésie maintiennent un   moratoire   strict sur l'exploitation minérale profonde,  privilégiant la protection de la biodiversité marine. De son côté, le président polynésien  Moetai Brotherson continue de défendre l'idée d'un processus de décolonisation  pacifique sous l'égide de l'ONU, assuman t une vision politique divergente de celle de  l'État central.  4. Sécurité, Menaces Hybrides et Perspectives Géopolitiques  Le Pacifique est le théâtre d'une polarisation accrue. La Stratégie Indopacifique de la  France fait de ses territoires d'outre - mer des pivots de sa souveraineté, mais aussi des  cibles de choix.  4.1. Ingérences et manipulation de l'information  Les territoires ont été la cible de guerres hybrides. Le service français   VIGINUM   a  notamment identifié le rôle du   Baku Initiative Group (BIG) , une organisation  azerbaïdjanaise. En représailles au soutien diplomatique français à l'Arménie,  l'Azerbaïdjan a amplifié numériquement les discours indépendantistes et diffusé des  fakes news (accusant par exemple la police de tirer sur des manifestants e n 2024).  4.2. Le dispositif militaire (FAPF et FANC)  La France garantit sa souveraineté via deux forces permanentes (environ 3 400  personnels au total) :  •   FANC (Nouvelle - Calédonie) :   Pilier aéroterrestre, elles ont également joué un  rôle fondamental dans le maintien de l'ordre public fin 2024.  •   FAPF (Polynésie) :   Axées sur l'action de l'État en mer (lutte contre le narcotrafic,  sauvetage, police des pêches), elles sécurisent l'immense ZEE polynésienne.  4.3. Les incertitudes géopolitiques à l'horizon 2026  Le retour de Donald Trump aux États - Unis en 2025 perturbe les équilibres régionaux. Les  risques de guerres commerciales douanières et le possible retrait américain du  multilatéralisme menacent de créer des   vides sécuritaires . Cette situation offre de  nouvelles opportunités de leadership à la Chine, tout en forçant la France à accentuer \nRessources  son rôle de puissance d'équilibre militaire et diplomatique auprès des partenaires  régionaux (Japon, Philippines).",

          "synthesis": "Ressources  L'Émergence et la Posture de la Chine (2020 - 2026)  Synthèse basée sur l'évolution diplomatique et les tensions en mer de Chine  méridionale.  Introduction  Sous la direction de Xi Jinping, la République populaire de Chine (RPC) a opéré une  mutation stratégique et rhétorique majeure. Ce rapport détaille le passage d'une  diplomatie traditionnellement discrète à une posture décomplexée et assertive, illustrée  pa r la « diplomatie du loup guerrier », ainsi que les conséquences de cette nouvelle  posture sur les contentieux territoriaux (mer de Chine méridionale) et les relations avec  les grandes puissances mondiales.  1. La Mutation de la Diplomatie Chinoise : L'Ère du « Loup Guerrier »  1.1. De la Discrétion à l'« Esprit Combattant »  Historiquement, la diplomatie chinoise post - Mao (entre 1980 et 2010) reposait sur la  doctrine de Deng Xiaoping, le   Taoguang Yanghui   (littéralement « cacher sa lumière et  cultiver l'obscurité »), qui prônait un profil bas pour favoriser le développement  économique.  Sous Xi Jinping, cette approche a été remplacée par la promotion d'un « esprit  combattant ». Cette nouvelle ère se caractérise par la diplomatie du « loup guerrier »  (Wolf Warrior Diplomacy   -   WWD), un terme emprunté à une franchise  cinématographique d'acti on patriotique chinoise. Elle marque une rhétorique  nationaliste, combative, et une volonté de la Chine de s'affirmer comme une puissance  mondiale d'égal à égal avec les États - Unis.  1.2. Facteurs Déclencheurs et Mécanismes  Cette posture agressive est alimentée par deux dynamiques :  •   Facteurs internes :   La nécessité de satisfaire un sentiment nationaliste  croissant et de répondre aux directives du Parti communiste (PCC) exigeant de «  bien raconter l'histoire de la Chine ».  •   Facteurs externes :   La pandémie de COVID - 19 a agi comme un catalyseur. Face  aux critiques occidentales, les diplomates chinois ont utilisé les réseaux sociaux  pour défendre Pékin et critiquer les démocraties occidentales.  •   L'interaction médiatique :   Les études montrent que l'agressivité des diplomates  du ministère des Affaires étrangères (MAE) est souvent une réponse directe  (tactique de   whataboutism   ou attaques   ad hominem ) aux questions jugées  hostiles des journalistes étrangers.  1.3. Limites et « Effet Bondaz » \nRessources  Cette approche peut se révéler contre - productive. L'« effet Bondaz » (du nom du  chercheur français Antoine Bondaz, ciblé par l'ambassade de Chine en France)  démontre qu'une attaque diplomatique excessive augmente paradoxalement la  notoriété de la cible et   renforce le sentiment anti - chinois dans l'opinion publique du  pays hôte.  2. Poudrière en Mer de Chine Méridionale  La mer de Chine méridionale, carrefour du commerce mondial, est le théâtre d'une  instabilité chronique (décrite comme « chauffée sans bouillir »), où s'affrontent  revendications souveraines et démonstrations de force.  2.1. La Confrontation Sino - Philippine  Depuis l'élection de Ferdinand Marcos Jr. en 2022, les Philippines ont durci leur position  face à Pékin.  •   Les points de friction :   Le récif de Second Thomas (où Manille a délibérément  échoué le navire   BRP Sierra Madre   en 1999 pour en faire un avant - poste) et le  récif de Scarborough.  •   Tactiques chinoises :   La Garde côtière chinoise (CCG) utilise des méthodes  coercitives sous le seuil du conflit armé : canons à eau, lasers militaires,  collisions volontaires et harcèlement des navires de ravitaillement philippins.  2.2. L'Expansionnisme Défensif du Vietnam  Face à la pression chinoise, le Vietnam a massivement accéléré ses activités de  poldérisation (remblayage et création d'îles artificielles) dans les îles Spratleys depuis  2022.  •   Ampleur :   Avec plus de 3 310 acres dragués et l'aménagement de 21 récifs (dont  une piste d'atterrissage militaire de 3,2 km sur le récif Barque Canada), les  travaux vietnamiens rivalisent désormais avec les infrastructures historiques de  la Chine.  •   Objectif :   Créer une dissuasion tactique et compliquer toute tentative  d'annexion par la force par Pékin.  2.3. La Guerre Juridique (Lawfare)  En 2016, la Cour Permanente d'Arbitrage (CPA) a invalidé les revendications historiques  chinoises basées sur la fameuse « ligne en neuf tirets ». En réponse, Pékin rejette ce  verdict et promeut désormais le concept des « Quatre Archipels » ( Four Sha ) pour  justifier juridiquement son emprise territoriale, tandis que ses voisins utilisent la  Convention des Nations Unies sur le droit de la mer (CNUDM) pour défendre leurs Zones  Économiques Exclusives (ZEE). \nRessources  3. Impasses Diplomatiques avec les Grandes Puissances  3.1. Union Européenne : Le Dilemme du « De - risking »  Les relations sino - européennes sont marquées par une méfiance structurelle.  •   Réduction des risques :   L'UE a adopté une stratégie de   de - risking   (réduction des  risques) pour limiter sa dépendance économique et technologique envers la  Chine, entraînant des frictions commerciales (ex: droits de douane sur les  véhicules électriques chinois).  •   Géopolitique :   Le refus de Pékin de condamner la Russie dans la guerre en  Ukraine est perçu par Bruxelles comme une menace sécuritaire majeure. La  Chine, de son côté, accuse l'UE de s'aligner sur l'endiguement américain.  3.2. Japon : Tensions et Avertissements  Les relations avec Tokyo se sont gravement détériorées entre 2025 et 2026,  principalement autour de la question de Taïwan (considérée par Pékin comme une  affaire purement interne via le « Principe d'une seule Chine »). L'agressivité de la  diplomatie chinoi se s'est illustrée par des menaces explicites sur les réseaux sociaux de  la part de diplomates chinois en poste au Japon (incident Xue Jian).  3.3. Les Risques pour 2026  •   L'incertitude américaine :   Le second mandat de Donald Trump fait peser un  risque de volatilité, la mer de Chine pouvant servir de levier dans des  négociations commerciales.  •   L'escalade accidentelle :   L'augmentation des face - à - face aériens (notamment  avec les Philippines) et les incursions massives de navires de pêche vietnamiens  dans les eaux revendiquées par la Chine accroissent le risque d'un incident  militaire involontaire.  Quiz d'",

          "synthesis": "Ressources  Rapport d'Analyse : Géopolitique et Sécurité de Taïwan (2025 - 2026)  Introduction  La période 2025 - 2026 marque une intensification significative des tensions dans le  détroit de Taïwan. La République populaire de Chine (RPC) y déploie une stratégie  multidimensionnelle alliant cyberguerre, coercition en \"zone grise\" et démonstrations  de fo rce militaire pour éroder la souveraineté de la République de Chine (Taïwan), sans  pour autant déclencher un conflit armé conventionnel immédiat. Ce rapport synthétise  les dynamiques sécuritaires, militaires et politiques en jeu.  1. Contexte Politique et Identitaire  1.1. Le concept de \"Non - subordination mutuelle\"  Face au récit de la \"Chine unique\" imposé par Pékin, l'administration du président  taïwanais Lai Ching - te (issu du Parti Démocrate Progressiste   -   DPP) promeut le concept  de « non - subordination mutuelle ». Cette posture affirme que Taïwan et la RPC sont deu x  entités distinctes qui ne sont pas subordonnées l'une à l'autre. Elle permet de maintenir  le   statu quo   et de revendiquer une souveraineté de facto tout en évitant le  franchissement de la ligne rouge que constituerait une déclaration formelle  d'indépendance de jure.  1.2. Construction mémorielle et identité nationale  L'identité taïwanaise s'est forgée en opposition au continent, influencée notamment  par :  •   L'héritage colonial japonais (1895 - 1945)   : Souvent mis en contraste avec  l'histoire continentale pour marquer une spécificité insulaire.  •   L'incident du 28 février 1947 (Massacre du 2 - 28)   : Ce soulèvement réprimé  dans le sang par le Kuomintang (KMT) a fait entre 10 000 et 30 000 morts. Point de  départ de la \"Terreur Blanche\", il constitue le socle mémoriel fondamental du  nationalisme civique et souverainiste taïwanais actuel.  2. La Cyberguerre et la Coercition en \"Zone Grise\"  L'informatisation des conflits est au cœur de la doctrine de l'Armée populaire de  libération (A contester et  éroder la souveraineté maritime et aérienne de Taïwan de manière incrémentale.  3.2. Strait Thunder - 2025A (Avril 2025)  Mené par le Commandement du Théâtre oriental de l'APL, cet exercice de grande  ampleur avait pour but stratégique de   simuler un blocus partiel et une attaque  surprise . Il s'est traduit par des patrouilles massives (plus de 135 avions et 38 navires en  48 heures) et des exercices d'interception et de détention en mer.  3.3. Justice Mission - 2025 (Décembre 2025)  Cet exercice a marqué un grave cap d'escalade. Hautement provocateur, il a impliqué : \nRessources  •   Des tirs à munitions réelles   (roquettes PHL - 16/PCL - 191) dont plusieurs ont  atterri dans la zone contiguë de Taïwan.  •   Le déploiement du navire d'assaut amphibie   Hubei   (classe Yushen) pour simuler  des raids héliportés.  •   La simulation de blocus des ports vitaux de Keelung et Kaohsiung.  4. Implications Internationales et Logistiques  L'objectif ultime de Pékin n'est pas seulement d'isoler Taïwan, mais aussi de   dissuader  toute intervention étrangère , en vertu notamment de la loi anti - sécession chinoise de  2005.  En cas de conflit ouvert, les planificateurs chinois viseraient directement la chaîne  d'approvisionnement militaire américaine. Les cibles probables incluraient :  •   Les infrastructures énergétiques (réseaux électriques, pipelines de carburant).  •   Les réseaux de transport (comme le fret ferroviaire) et les télécommunications.  L'objectif serait de paralyser la logistique et d'entraver la production de  Munitions Guidées de Précision (PGM) , cruciales pour une défense taïwanaise  soutenue par l'allié américain (via le   Taiwan Relations Act ). Face à ces menaces,  le soutien des pays du G7 et des démocraties de l'Indo - Pacifique reste essentiel  pour contrer la stratégie d'encerclement.  5. Questionnaire d'Évaluation (QCM)  Testez vos connaissances sur la base des éléments étudiés dans ce rapport.",

          "synthesis": "Ressources  Rapport d'Expert : La Compétition États - Unis - Chine et l'Unité de l'ASEAN (2025 -  2026)  Introduction : L'ASEAN à la Croisée des Chemins  L'Association des nations de l'Asie du Sud - Est (ASEAN) fait aujourd'hui face à des  turbulences géopolitiques structurelles majeures. Historiquement, l'organisation a  fondé sa prospérité et sa stabilité sur l'« ASEAN Way », une doctrine reposant sur la  neut ralité, le consensus, l'inclusivité et la non - ingérence dans les affaires intérieures de  ses membres (concept ZOPFAN). Cependant, l'intensification de la compétition entre  les États - Unis et la Chine remet profondément en cause ce modèle, générant des  divis ions internes et révélant des asymétries de dépendance parmi les pays membres.  Ce rapport propose une analyse approfondie des stratégies des grandes puissances,  des lignes de fracture au sein de l'ASEAN, ainsi que des risques régionaux et des  recommandations pour y faire face.  1. Dynamiques et Stratégies des Grandes Puissances  La région indopacifique est le théâtre principal d'un affrontement géoéconomique et  stratégique où Washington et Pékin déploient des stratégies radicalement différentes.  1.1 La Chine : Planification, Intégration et Coercition  La stratégie chinoise se caractérise par une vision de long terme et une forte intégration  géoéconomique.  •   Intégration et Planification :   Le 15e Plan Quinquennal (2026 - 2030) met l'accent  sur l'autosuffisance technologique (IA, technologies vertes). Pour l'ASEAN, cela  se traduit par la signature fin 2025 de   l'ACFTA 3.0   (ASEAN - China Free Trade  Area), un accord modernisé axé sur le commerce numérique et les chaînes  d'approvisionnement vertes, visant à atteindre 1 000 milliards de dollars  d'échanges annuels d'ici 2030.  •   Levier des Terres Rares :   La Chine jouit d'un quasi - monopole sur l'extraction  (69 %) et le traitement (92 %) des terres rares. Comme observé lors du sommet  de Busan en octobre 2025, elle n'hésite pas à utiliser des contrôles d'exportation  extraterritoriaux comme arme de négociatio n diplomatique et économique.  •   Coercition Maritime :   Sur le plan territorial, la Chine maintient la pression dans  la zone de la « ligne en neuf traits » (Mer de Chine méridionale), n'hésitant pas à  recourir à la force, comme l'illustre l'éperonnage d'un navire philippin près de l'île  de Thitu en octobre 202 5.  1.2 Les États - Unis : Bilatéralisme Sélectif et Réalisme \nRessources  Du côté américain, l'approche est plus cyclique (influencée par l'administration \"Trump  2.0\") et centrée sur la sécurité régionale.  •   La Stratégie de Sécurité Nationale (NSS 2025) :   Le document abandonne la  rhétorique purement idéologique pour un réalisme géoéconomique. Il fait de  l'Indo - Pacifique un théâtre décisif, utilisant les tarifs douaniers et les exigences  de contenu local (règles d'origine) comme leviers d'alignement.  •   Sécurité et Minilatéralisme :   Les États - Unis renforcent un bilatéralisme sélectif  (ex: accord EDCA avec les Philippines) et privilégient des alliances de type  AUKUS (Australie, Royaume - Uni, USA) ou \"Squad\" (USA, Japon, Australie,  Philippines). Toutefois, ces alliances sont parfois per çues avec méfiance par  d'autres acteurs de l'ASEAN.  2. La Fragmentation Interne de l'ASEAN  La pression exercée par cette compétition met en lumière une asymétrie de  dépendance qui fracture l'unité de l'association.  2.1 La Fracture ASEAN - 6 vs CLMV  Une ligne de rupture nette sépare deux blocs :  •   L'ASEAN - 6   (Brunei, Indonésie, Malaisie, Philippines, Singapour, Thaïlande) :  Présente une dépendance modérée et tente de maintenir une croissance  équilibrée de ses partenariats.  •   Le groupe CLMV   (Cambodge, Laos, Myanmar, Vietnam) : Ces pays présentent  une dépendance économique massive et disproportionnée envers la Chine,  notamment en matière de dette (infrastructures des Nouvelles Routes de la Soie)  et d'Investissements Directs Étrangers (IDE). L e Cambodge et le Laos sont  souvent considérés comme des alliés de fait, bloquant parfois les consensus  régionaux défavorables à Pékin.  2.2 L'Évolution du \"Hedging\" (Couverture Stratégique)  La traditionnelle posture d'équidistance (Hedging) évolue. Les pays ne peuvent plus  rester passifs.  •   L'approche sécuritaire (Philippines) :   Exaspérée par la coercition chinoise et le  manque de soutien de l'ASEAN, Manille bascule vers un alignement clair avec les  États - Unis.  •   Le Hedging anticipatif (Singapour, Vietnam) :   Face aux risques, ces pays  anticipent les crises de découplage (technologique, chaînes de valeur) et  équilibrent très activement leurs partenariats pour garantir leur autonomie. \nRessources  •   L'équidistance pragmatique (Indonésie, Malaisie) :   Ces pays rejettent  l'alignement, expriment des craintes face à AUKUS (risque de course aux  armements) et tissent des liens avec d'autres pôles comme les BRICS.  3. Risques Géopolitiques et Scénarios de Contingence  La région se prépare à l'éventualité de crises majeures qui pourraient déstabiliser  l'économie mondiale.  •   Mer de Chine Méridionale (SCS) :   La zone grise devient un point de friction  économique direct (entrave à l'exploration gazière pour le Vietnam et les  Philippines, menaces sur les câbles de données sous - marins).  •   Contingence à Taïwan :   Une majorité d'experts estime qu'un conflit armé reste  un impératif politique pour Pékin, non dissuadé par ses problèmes militaires  internes. Ce scénario inquiète vivement la région : le Vietnam anticipe un choc  majeur sur la chaîne des semi - conducteurs,   tandis que les Philippines redoutent  une crise humanitaire (rapatriement de travailleurs) et une implication militaire  via les bases EDCA.  4. Recommandations : Vers une \"Résilience Régionale\"  Pour survivre à ce contexte de plus en plus polarisé, les experts plaident pour un  renouveau de la stratégie de l'ASEAN :  1.   Unité politique :   Le maintien de la           "synthesis": "Ressources  Rapport de Synthèse : Intégration Économique Régionale (RCEP) et Réponses  Stratégiques de l'ASEAN  Ce rapport propose une analyse approfondie des dynamiques commerciales dans  l'espace Indo - Pacifique, structurée autour de deux axes majeurs : la mise en œuvre du  Partenariat Économique Régional Global (RCEP) et la réponse de l'ASEAN face aux  pressions tari faires américaines en 2025.  1. Le RCEP : Cadre, Portée et Mécanismes d'Intégration  1.1. Genèse et Poids Économique  Entré en vigueur le 1er janvier 2022, le Partenariat Économique Régional Global (RCEP)  est le plus grand accord de libre - échange au monde. Conçu initialement en 2011 pour  démêler le \"bol de nouilles\" (l'enchevêtrement complexe d'accords bilatéraux en Asie) , il  rassemble les 10 pays de l'ASEAN auxquels s'ajoutent la Chine, le Japon, la Corée du  Sud, l'Australie et la Nouvelle - Zélande.  Chiffres clés (Projections 2025 - 2026) :  •   Population :   2,3 milliards de personnes.  •   PIB cumulé :   ~33,7 billions USD (environ 30% du PIB mondial).  •   Objectif principal :   Éliminer les barrières tarifaires sur 92% des marchandises  sur une période de 20 ans, tout en favorisant une approche pragmatique axée sur  le développement (contrairement au CPTPP qui impose des normes  environnementales et sociales strictes).  1.2. Mécanismes d'Intégration et Moteurs de Croissance  La véritable force du RCEP repose sur ses mécanismes d'intégration logistique et  douanière :  •   Harmonisation des Règles d'Origine (RoO) :   L'accord fixe un Contenu de Valeur  Régionale (RVC) commun à 40%. Si 40% de la valeur d'un produit provient de la  zone RCEP, il circule en franchise de droits.  •   Cumul Régional :   Les 15 pays sont considérés comme une zone de production  unique. Un produit assemblé au Vietnam avec des matières premières chinoises  et australiennes bénéficiera du label \"originaire du RCEP\".  Économiquement, le bloc est propulsé par les   exportations   et les   Investissements  Directs Étrangers (IDE) sortants , renforçant le modèle de \"l'Usine Asie\". Toutefois, des  vulnérabilités subsistent, notamment la dépendance excessive aux IDE entrants et  l'immense disparité de richesse entre les États membres (ex: Singapour vs Myanmar),  nécessitant de longues périodes de   transition tarifaire pour les pays les moins avancés. \nRessources  2. Géopolitique : La Centralité de la Chine et le Retrait de l'Inde  2.1. Le Pivot Chinois et la \"Dual Circulation\"  L'accord consacre la domination économique de Pékin dans la région. Face aux  barrières tarifaires occidentales et à la volonté américaine de \"découplage\", la Chine  utilise le RCEP via sa stratégie de   \"Dual Circulation\"   (circulation externe). Le RCEP  facilite également la stratégie   \"Chine+1\"   : plutôt que de perdre ses chaînes  d'approvisionnement, la Chine les étend vers l'ASEAN (devenue son premier partenaire  commercial). Le Vietnam, par exemple, exporte massivement vers les États - Unis tout en  s'approvisionnant en composants chinois détaxés v ia le RCEP.  2.2. Le Dilemme et le Retrait de l'Inde  Membre fondateur des négociations, l'Inde s'est retirée avec fracas en 2019. Ses  motivations étaient multiples :  •   Crainte d'un déficit commercial endémique :   L'industrie indienne craignait  d'être inondée par les produits manufacturés chinois (le déficit avec la Chine a  tout de même atteint 100 milliards USD en 2025).  •   Protectionnisme agricole :   Le puissant secteur laitier indien craignait la  concurrence déloyale de l'Australie et de la Nouvelle - Zélande.  •   Absence de garanties :   Refus d'un mécanisme de sauvegarde automatique  (ATSM).  Aujourd'hui, l'Inde subit un \"détournement de commerce\" au profit du Vietnam, mais  compense par une stratégie de découplage calculé, signant des accords bilatéraux avec  des \"démocraties amies\" et rejoignant l'IPEF sous l'égide américaine.  3. L'ASEAN face à l'Agenda Commercial Américain (2025)  L'année 2025 a été marquée par une offensive tarifaire brutale de l'administration  américaine, révélant les failles de la solidarité au sein de l'ASEAN.  3.1. Le Choc de la \"Journée de la Libération\"  En avril 2025, les États - Unis ont imposé des tarifs douaniers punitifs massifs. Des pays  comme le Cambodge (49%), le Laos (48%) ou le Vietnam (46%) ont été durement ciblés.  Malgré la création de l' ASEAN Geoeconomics Task Force   et une déclaration appelant au  dialogue sans rétorsion, le front uni s'est rapidement fissuré.  3.2. Fractures de l'Action Collective et Stratégies Individuelles  •   Le cas du Vietnam :   Le pays a rompu l'unité en offrant unilatéralement  l'élimination totale des tarifs sur les importations américaines. Cet accord  intègre cependant des clauses strictes contre le   transbordement   (les produits \nRessources  transbordés par le Vietnam pour masquer leur origine chinoise subissent un tarif  punitif de 40%).  •   Le cas de la Malaisie :   La signature d'un accord bilatéral ( Agreement on  Reciprocal Trade   -   ART) a soulevé des inquiétudes en matière de souveraineté,  car il oblige Kuala Lumpur à s'aligner sur les restrictions de   sécurité nationale  américaines contre des pays tiers.  •   Le cas de Singapour :   À l'inverse, Singapour a refusé le bilatéralisme  asymétrique, dénonçant l'affaiblissement de l'OMC et du multilatéralisme.  3.3. Un Bilan Paradoxal  Malgré les menaces, les exportations de l'ASEAN vers les États - Unis ont bondi de 36,5%  au deuxième trimestre 2025. Cette résilience artificielle s'explique principalement par  un restockage anticipé effréné par les entreprises avant l'entrée en vigueur effe ctive des  tarifs en août.  4. Perspectives : Restaurer la Centralité de l'ASEAN  Pour éviter d'être écartelée entre le parapluie sécuritaire américain et la dépendance  économique chinoise, la région doit viser la   \"Centralité de l'ASEAN\" . Cela implique :  1.   Le renforcement des capacités domestiques   pour éviter une           "synthesis": "Ressources  La France dans l'Indopacifique   –   Stratégies et Engagements 2025  Introduction : La France, puissance résidente et souveraine  En 2025, la France s'affirme de manière incontestable comme une puissance  souveraine et résidente de la région indopacifique. Cette légitimité repose sur sa  géographie : grâce à ses Départements, Régions et Collectivités d'Outre - Mer (DROM -  COM) tels que La   Réunion, Mayotte, la Nouvelle - Calédonie et la Polynésie française, la  France compte entre 1,6 et 1,8 million de citoyens dans cette zone. De plus, ces  territoires lui confèrent la deuxième Zone Économique Exclusive (ZEE) mondiale, dont  plus de 90 % (jusqu' à 93 % selon les estimations) se situent dans l'Indopacifique.  Face à la polarisation du monde, la stratégie française repose sur trois axes majeurs : la  sécurité maritime, l'autonomie stratégique et la préservation de l'environnement, tout  en faisant face à des défis logistiques et militaires structurels.  1. La diplomatie de la « Troisième Voie »  La pierre angulaire de l'approche géopolitique française est la promotion d'une «  troisième voie ». Face à la rivalité sino - américaine croissante, la France :  •   Refuse la logique de blocs :   Elle s'oppose à une confrontation à somme nulle et  à un alignement aveugle.  •   Promeut une \"coalition d'indépendances\" :   Inspirée par le « génie de Bandung  », cette approche cherche à lier l'Europe et l'Asie dans le respect du droit  international.  •   Maintient son autonomie stratégique :   Tout en restant un allié fiable des États -  Unis, la France garde sa capacité d'action et d'analyse propre, se positionnant en  critique ferme mais constructif face aux ambitions hégémoniques (notamment  de la Chine à Taïwan ou aux Philippines).  •   Soutient le multilatéralisme :   Elle s'appuie sur la centralité de l'ASEAN et  s'implique dans les organisations régionales (IORA, Commission de l'Océan  Indien).  2. Projection de puissance et appareil militaire  La souveraineté française est assurée par un engagement militaire robuste, bien que  sous tension. Près de 7 000 militaires sont déployés en permanence dans les forces de  souveraineté (FAZSOI à La Réunion/Mayotte, FANC en Nouvelle - Calédonie, FAPF en  Polynés ie) et les forces de présence (Djibouti, Émirats).  •   La Mission Clemenceau (2025) :   Déploiement historique du Groupe Aéronaval  (GAN) français jusqu'au Pacifique. Il a réuni le porte - avions   Charles de Gaulle , 22 \nRessources  Rafale Marine, quatre frégates, un sous - marin nucléaire d'attaque (SNA) et plus  de 3 000 marins pour renforcer l'interopérabilité régionale.  •   Les exercices combinés :   La France participe à des manœuvres complexes pour  sécuriser les voies maritimes (SLOC), telles que l'exercice multilatéral   La  Pérouse   ou l'exercice bilatéral   Varuna   avec l'Inde.  •   Les pôles stratégiques (Hubs) :   *   La Réunion   : Centre militaire névralgique  abritant plus de 2 000 personnels et la nouvelle Académie de l'océan Indien.  o   La Polynésie française   : En développement comme hub numérique et  aérien reliant l'Asie à l'Amérique du Sud (notamment via des câbles sous -  marins vers le Chili).  3. L'axe Paris - New Delhi : Un partenariat stratégique central  L'Inde s'est imposée comme le partenaire incontournable de la France dans la région.  •   Convergences institutionnelles :   En 2026, la France présidera la Commission  de l'Océan Indien (COI) tandis que l'Inde prendra la tête de l'IORA et de l'IONS.  •   Sécurité maritime :   Forte collaboration avec le centre de fusion d'informations  maritimes à New Delhi (IFC - IOR).  •   Perspectives :   Négociations en cours pour un pacte de sécurité, des patrouilles  conjointes dans le sud - ouest de l'Océan Indien, et intégration au corridor  économique IMEC (Inde   -   Moyen - Orient   -   Europe).  4. Engagement environnemental : Le modèle de l'Initiative Kiwa  La sécurité régionale dépend également de la résilience climatique. L'Initiative Kiwa  illustre l'action française :  •   Dotation et gestion :   Un fonds de 77 millions d'euros financé par des bailleurs  multiples (UE, France, Australie, Nouvelle - Zélande, Canada) piloté par l'AFD.  •   Méthodologie :   Utilisation des Solutions fondées sur la Nature (SfN) pour  protéger la biodiversité et adapter les populations.  •   Impact :   Soutien à 40 projets dans 17 territoires (bénéficiant à plus de 220 000  personnes).  o   Projets locaux :   Gérés par l'UICN (ex. restauration des mangroves en  Nouvelle - Calédonie).  o   Projets régionaux :   Gérés par l'AFD (budget de 3 à 5 millions d'euros pour  une coopération transnationale).  5. Défis structurels : L'analyse critique du Sénat \nRessources  Malgré ses ambitions, la France fait face à une réalité matérielle difficile, soulignée par  les rapports parlementaires :  •   Attrition capacitaire :   Le Sénat alerte sur une baisse drastique des effectifs ( -  20 % depuis 2008) et sur le vieillissement critique des équipements de  surveillance (avions Casa, hélicoptères Puma, frégates Floréal).  •   Trous capacitaires :   Retards dans le déploiement des Patrouilleurs Outre - Mer  (POM), essentiels face à la pêche illégale et à la montée en puissance de la  marine chinoise (+138 % de tonnage en 15 ans).  •   La « tyrannie des distances » :   Paris étant à 16 000 km de Nouméa, la  centralisation des décisions nuit à la réactivité stratégique.  6. Recommandations pour une nouvelle gouvernance  Pour pallier ces faiblesses, le Sénat propose une « révolution copernicienne » :  1.   Zonage stratégique :   Diviser la gestion en quatre zones (Océan Indien  occidental, Indopacifique central/ASEAN, Pacifique Sud, Pacifique Oriental).  2.   Pilotage politique décentralisé :   Nommer quatre Secrétaires d'État dédiés à ces  zones spécifiques.  3.   Sanctuarisation budgétaire :   Garantir l'application stricte de la Loi de  Programmation Militaire (LPM) pour livrer les équipements promis en temps  voulu.  4.   Élargissement du spectre :   Assumer le soutien à Taïwan dans les forums  internationaux et intégrer l'Amérique Latine dans l'architecture régionale.",

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            mermaid.initialize({ startOnLoad: false, theme: 'default' });
            
            const dictContainer = document.getElementById('dict-container');
            const orgaContainer = document.getElementById('orga-container');
            const searchBar = document.getElementById('search-bar');
            
            const terms = window.siteData.glossary || [];
            const orgas = window.siteData.organigrams || [];
            
            // Build Dict
            terms.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'glass-panel dict-card js-searchable';
                card.dataset.text = (item.term + ' ' + item.def).toLowerCase();
                card.innerHTML = `
                    <h3>${item.term}</h3>
                    <p style="font-size:0.95rem;">${item.def}</p>
                `;
                dictContainer.appendChild(card);
            });

            // Build Orgas
            orgas.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'glass-panel dict-card orga-card js-searchable';
                card.dataset.text = item.title.toLowerCase();
                card.innerHTML = `
                    <h3>${item.title}</h3>
                    <div class="mermaid">
                        ${item.mermaid}
                    </div>
                `;
                orgaContainer.appendChild(card);
            });
            
            // Render mermaid
            mermaid.run();

            // Search logic
            searchBar.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                const items = document.querySelectorAll('.js-searchable');
                
                items.forEach(item => {
                    if (query === '' || item.dataset.text.includes(query)) {
                        item.classList.remove('hidden');
                    } else {
                        item.classList.add('hidden');
                    }
                });
            });
        });
    </script>
